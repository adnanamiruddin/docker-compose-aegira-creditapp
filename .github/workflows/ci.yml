name: CI/CD Deploy Aegira-Creditapp

on:
  push:
    branches:
      - main

jobs:
  backend-test:
    runs-on: [self-hosted, docker-local]
    defaults:
      run:
        working-directory: aegira-loan-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - name: Install Maven
        run: |
          apt-get update
          apt-get install -y maven
      - name: Test Backend
        run: mvn clean test

  frontend-test:
    runs-on: [self-hosted, docker-local]
    defaults:
      run:
        working-directory: creditappdemo
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build

  deploy:
    needs:
      - backend-test
      - frontend-test
    runs-on: [self-hosted, docker-local]
    steps:
      - uses: actions/checkout@v4
      - run: docker compose up -d --build
