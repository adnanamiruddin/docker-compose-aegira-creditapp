name: CI/CD Deploy Aegira-Creditapp

on:
  push:
    branches:
      - main

jobs:
  backend-test:
    name: Backend Test
    runs-on: [self-hosted, docker-local]
    defaults:
      run:
        working-directory: aegira-loan-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - name: Install Maven
        run: |
          sudo apt-get update
          sudo apt-get install -y maven
      - name: Run Backend Test
        run: mvn clean test

  frontend-test:
    name: Frontend Build Test
    runs-on: [self-hosted, docker-local]
    defaults:
      run:
        working-directory: creditappdemo
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Dependencies
        run: npm ci
      - name: Build Frontend
        run: npm run build

  build-backend-image:
    name: Build & Push Backend Image
    runs-on: [self-hosted, Linux]
    needs:
      - backend-test
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build Backend Image
        uses: docker/build-push-action@v6
        with:
          context: ./aegira-loan-service
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/aegira-loan-service-backend:latest

  build-frontend-image:
    name: Build & Push Frontend Image
    runs-on: [self-hosted, Linux]
    needs:
      - frontend-test
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build Frontend Image
        uses: docker/build-push-action@v6
        with:
          context: ./creditappdemo
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/creditapp-frontend:latest

  deploy:
    name: Deploy Application
    runs-on: [self-hosted, Linux]
    needs:
      - build-backend-image
      - build-frontend-image
    steps:
      - uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Pull Latest Images
        run: |
          docker compose -f docker-compose-deploy.yml pull
      - name: Deploy Containers
        run: |
          docker compose -f docker-compose-deploy.yml up -d --remove-orphans
      - name: Verify Running Containers
        run: docker ps
